<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg); margin: 0; padding: 20px; font-family: var(--font-sans); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 16px 40px rgba(0,0,0,0.12); overflow: hidden; margin-bottom: 14px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 20px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -0.02em; }
  .card-body { padding: 20px; }
  .featured { border-color: color-mix(in srgb, var(--accent) 22%, var(--border)); position: relative; box-shadow: 0 18px 38px color-mix(in srgb, var(--accent) 10%, transparent); }
  .featured::before { content:''; position:absolute; inset:0 auto 0 0; width:4px; background:linear-gradient(180deg,var(--accent),color-mix(in srgb,#3b82f6 70%,var(--accent))); opacity:0.95; }
  .meta { font-size: 12px; color: var(--text-muted); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="card-header">
        <span class="card-title">Tabela de preços</span>
        <span class="meta">Base do simulador</span>
      </div>
      <div class="card-body" style="font-size:13px;color:var(--text-muted)">
        Conteúdo padrão do card com header.
      </div>
    </div>
    <div class="card featured">
      <div class="card-header">
        <span class="card-title">Consultas hoje</span>
      </div>
      <div class="card-body">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.16em;color:var(--text-dim);margin-bottom:10px">Consultas hoje</div>
        <div style="font-family:var(--font-mono);font-size:34px;font-weight:600;color:var(--accent);line-height:1">1.847</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">R$ 0,22 consumidos hoje</div>
      </div>
    </div>
  </div>
</body>
</html>
