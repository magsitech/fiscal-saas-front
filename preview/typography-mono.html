<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg); margin: 0; padding: 20px; font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 16px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .meta { width: 120px; flex-shrink: 0; font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }
  .chip { display: inline-flex; padding: 3px 8px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; font-weight: 700; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">52px / 600<br>hero balance</div>
    <div style="font-family:var(--font-mono);font-size:52px;font-weight:600;line-height:1;letter-spacing:-0.03em;color:var(--text)">
      <span style="font-size:20px;opacity:0.65;margin-right:4px;color:var(--text-muted)">R$</span>1.250,00
    </div>
  </div>
  <div class="row">
    <div class="meta">34px / 600<br>KPI featured</div>
    <div style="font-family:var(--font-mono);font-size:34px;font-weight:600;line-height:1;color:var(--accent)">1.847</div>
  </div>
  <div class="row">
    <div class="meta">28px / 600<br>KPI standard</div>
    <div style="font-family:var(--font-mono);font-size:28px;font-weight:600;line-height:1;color:var(--info)">R$ 42,30</div>
  </div>
  <div class="row">
    <div class="meta">14px / 600<br>stat value</div>
    <div style="font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--text)">12 dias</div>
  </div>
  <div class="row">
    <div class="meta">12px / 400<br>table / date</div>
    <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted)">24/04/2026</div>
  </div>
  <div class="row">
    <div class="meta">11px / 700<br>NF model chip</div>
    <div style="display:flex;gap:8px">
      <span class="chip" style="background:var(--info-dim);color:var(--info)">NF-e</span>
      <span class="chip" style="background:var(--accent-dim);color:var(--accent)">NF-Ce</span>
    </div>
  </div>
  <div class="row">
    <div class="meta">11px / 400<br>NF key truncated</div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--text-muted)">35250412345…6789</div>
  </div>
</body>
</html>
