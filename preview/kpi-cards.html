<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg); margin: 0; padding: 20px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 16px 40px rgba(0,0,0,0.12); overflow: hidden; position: relative; }
  .card::after { content:''; position:absolute; inset: auto -20px -30px auto; width:120px; height:120px; border-radius:999px; background:radial-gradient(circle,rgba(255,255,255,0.08),transparent 70%); pointer-events:none; }
  .featured { border-color: color-mix(in srgb, var(--accent) 22%, var(--border)); box-shadow: 0 18px 38px color-mix(in srgb, var(--accent) 10%, transparent); position: relative; }
  .featured::before { content:''; position:absolute; inset:0 auto 0 0; width:4px; background:linear-gradient(180deg,var(--accent),color-mix(in srgb,#3b82f6 70%,var(--accent))); z-index:1; }
  .inner { padding: 22px 22px 22px 26px; display: flex; flex-direction: column; gap: 10px; }
  .card:not(.featured) .inner { padding: 22px; }
  .kicker { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; color: var(--text-dim); }
  .value { font-family: var(--font-mono); font-size: 30px; font-weight: 600; line-height: 1; }
  .note { font-size: 12px; color: var(--text-muted); line-height: 1.6; padding-top: 6px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
  <div class="grid">
    <div class="card featured">
      <div class="inner">
        <div class="kicker">Consultas hoje</div>
        <div class="value" style="color:var(--accent);font-size:34px">1.847</div>
        <div class="note">R$ 0,22 consumidos hoje</div>
      </div>
    </div>
    <div class="card featured">
      <div class="inner">
        <div class="kicker">Consultas no período</div>
        <div class="value" style="color:var(--info);font-size:34px">24.530</div>
        <div class="note">R$ 3.188,90 debitados. Próxima: R$ 0,13</div>
      </div>
    </div>
    <div class="card">
      <div class="inner">
        <div class="kicker">Saldo utilizado</div>
        <div class="value" style="color:var(--warn)">R$ 42,30</div>
        <div class="note">de R$ 200,00 no período</div>
      </div>
    </div>
    <div class="card">
      <div class="inner">
        <div class="kicker">Status do saldo</div>
        <div class="value" style="color:var(--accent);font-size:22px">ATIVO</div>
        <div class="note">12 dias restantes</div>
      </div>
    </div>
  </div>
</body>
</html>
