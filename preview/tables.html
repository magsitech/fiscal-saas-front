<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--bg); margin: 0; padding: 20px; font-family: var(--font-sans); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  th { background: var(--surface-2); border-bottom: 1px solid var(--border); padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface-2); }
  .badge { display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600; }
  .dot { width:6px;height:6px;border-radius:50%;background:currentColor; }
  .mono { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
  .chip { font-family:var(--font-mono);font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px; }
</style>
</head>
<body>
  <table>
    <thead>
      <tr>
        <th>Chave NF-e</th>
        <th>Modelo</th>
        <th>Status</th>
        <th style="text-align:right">Data</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><span class="mono">35250412345…6789</span></td>
        <td><span class="chip" style="background:var(--info-dim);color:var(--info)">NF-e</span></td>
        <td><span class="badge" style="background:var(--accent-dim);color:var(--accent)"><span class="dot"></span>Autorizada</span></td>
        <td style="text-align:right"><span class="mono">24/04/2026</span></td>
      </tr>
      <tr>
        <td><span class="mono">35250498765…0012</span></td>
        <td><span class="chip" style="background:var(--accent-dim);color:var(--accent)">NF-Ce</span></td>
        <td><span class="badge" style="background:var(--warn-dim);color:var(--warn)"><span class="dot"></span>Pendente</span></td>
        <td style="text-align:right"><span class="mono">23/04/2026</span></td>
      </tr>
      <tr>
        <td><span class="mono">35250411111…3344</span></td>
        <td><span class="chip" style="background:var(--info-dim);color:var(--info)">NF-e</span></td>
        <td><span class="badge" style="background:var(--danger-dim);color:var(--danger)"><span class="dot"></span>Cancelada</span></td>
        <td style="text-align:right"><span class="mono">22/04/2026</span></td>
      </tr>
      <tr>
        <td><span class="mono">35250455555…9900</span></td>
        <td><span class="chip" style="background:var(--info-dim);color:var(--info)">NF-e</span></td>
        <td><span class="badge" style="background:var(--info-dim);color:var(--info)"><span class="dot"></span>Processando</span></td>
        <td style="text-align:right"><span class="mono">22/04/2026</span></td>
      </tr>
    </tbody>
  </table>
</body>
</html>
