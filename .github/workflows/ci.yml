name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - app_env: staging
            use_mock_api: false
            api_base_url: https://staging.api.validaenota.com.br
          - app_env: main
            use_mock_api: false
            api_base_url: https://api.validaenota.com.br
    env:
      VITE_APP_ENV: ${{ matrix.app_env }}
      VITE_USE_MOCK_API: ${{ matrix.use_mock_api }}
      VITE_API_BASE_URL: ${{ matrix.api_base_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check / lint
        run: npm run lint

      - name: Build
        run: npm run build
